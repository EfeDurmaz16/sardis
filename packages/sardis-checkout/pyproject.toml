[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sardis-checkout"
version = "0.99.0"
description = "Deprecation shim — sardis-checkout is now part of the `sardis` umbrella package (use `from sardis.checkout import ...`)."
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [{name = "Sardis Team", email = "dev@sardis.sh"}]
maintainers = [{name = "Sardis Team", email = "dev@sardis.sh"}]
keywords = ["sardis", "checkout", "psp", "payments", "orchestration", "ai-agents", "fintech"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "sardis>=2.0.0a0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]


[project.urls]
Homepage = "https://sardis.sh"
Documentation = "https://sardis.sh/docs"
Repository = "https://github.com/EfeDurmaz16/sardis"
Changelog = "https://github.com/EfeDurmaz16/sardis/blob/main/CHANGELOG.md"
"Bug Tracker" = "https://github.com/EfeDurmaz16/sardis/issues"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "C4", "UP", "N", "SIM"]
ignore = ["E501", "B008", "B904", "E402", "N806", "N801", "N818", "B023", "B017", "E741", "B027", "F821", "E722", "N802", "SIM102", "SIM105", "SIM108", "SIM113", "SIM103", "SIM117", "PLC0415", "PLR0912", "PLR0915", "PLR0911", "UP035"]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401", "F811"]
"tests/**" = ["F401", "F811", "F841", "E722", "B007", "N802"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
