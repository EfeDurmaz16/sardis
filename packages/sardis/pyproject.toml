[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "sardis"
version = "2.0.0a0"
description = "Payment OS for the Agent Economy — Python SDK, CLI, and runtime primitives"
readme = "README.md"
license = "MIT"
authors = [{name = "Sardis", email = "hello@sardis.sh"}]
requires-python = ">=3.11"
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Office/Business :: Financial",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
  "Framework :: AsyncIO",
]
keywords = ["sardis", "payments", "agents", "stablecoin", "x402", "ap2", "ucp", "agent-economy"]

# Runtime deps for the PUBLISHED thin client surface only.
#
# The published wheel ships _client/resources/models/integrations/cli, which
# import only: httpx, pydantic, click, rich (+ stdlib). The previous list
# inherited heavy backend deps (asyncpg, fastapi, web3-adjacent, numpy,
# apscheduler, cryptography, PyNaCl, pydantic-settings) from modules that are
# NO LONGER shipped in the wheel — keeping them would re-introduce the
# dependency bloat the wheel-split is meant to remove. Backend deps live with
# the backend (installed via the editable workspace for apps/api), and
# framework-specific deps stay under [project.optional-dependencies].
dependencies = [
  # HTTP transport (sardis._client)
  "httpx>=0.27",
  # Typed models / request+response validation (sardis.models, resources)
  "pydantic>=2.6",
  # CLI (sardis.cli)
  "click>=8.1",
  "rich>=13.0",
]

[project.optional-dependencies]
anthropic     = ["anthropic>=0.40"]
langchain     = ["langchain>=0.3", "langchain-core>=0.3"]
crewai        = ["crewai>=0.95"]
openai-agents = ["openai-agents>=0.2"]
autogpt       = []  # autogpt-platform-backend not on PyPI; deferred
browser-use   = ["browser-use>=0.1.40"]
composio      = ["composio-core>=0.5"]
adk           = ["google-adk>=1.0"]
a2a           = []
ai-sdk        = []
postgres      = ["psycopg[binary,pool]>=3.2", "sqlalchemy>=2.0"]
redis         = ["redis>=5.2"]
immudb        = ["immudb-py>=1.5"]
chain         = ["web3>=6.20", "eth-account>=0.13", "eth-abi>=5.0"]
all = [
  "sardis[anthropic,langchain,crewai,openai-agents,autogpt,browser-use,composio,adk,a2a,ai-sdk,postgres,redis,immudb,chain]",
]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-httpx>=0.30",
  "pytest-cov>=4.1",
  "mypy>=1.8",
  "ruff>=0.5",
  "respx>=0.20",
]

[project.scripts]
sardis     = "sardis.cli.main:cli"
sardis-cli = "sardis.cli.main:cli"

[project.urls]
Homepage      = "https://sardis.sh"
Documentation = "https://sardis.sh/docs"
Repository    = "https://github.com/EfeDurmaz16/sardis"
Changelog     = "https://github.com/EfeDurmaz16/sardis/blob/main/packages/sardis/CHANGELOG.md"

# PUBLISHED WHEEL SURFACE (thin client only).
#
# The source tree under src/sardis also contains the backend (core, chain,
# cards, checkout, compliance, wallet, ledger, ucp, ramp, guardrails, protocol).
# apps/api imports those locally via the editable workspace install
# (`[tool.uv.sources] sardis = { path = "packages/sardis", editable = true }`),
# so excluding them here does NOT affect the dev/test suite — only the artifact
# uploaded to PyPI.
#
# We EXCLUDE the backend from the published wheel for two reasons:
#   1. Moat leak: shipping sardis.chain made ChainExecutor (a policy-BYPASSING
#      executor that talks straight to the orchestrator-less dispatch path)
#      importable by any pip user. The published surface must not expose an
#      execution path that skips the policy engine.
#   2. Dependency bloat: the backend pulls in asyncpg/fastapi/web3/etc. that a
#      thin API client does not need.
#
# The published wheel contains ONLY the thin client surface:
#   _client, _version, bulk, pagination, telemetry, py.typed,
#   resources/, models/, integrations/, cli/.
# (protocol/ is excluded: it is server-side API payloads coupled to sardis.core
#  — "Typed protocol payloads for the API service" — not a pip-consumer surface.)
[tool.hatch.build.targets.wheel]
packages = ["src/sardis"]
exclude = [
  "src/sardis/core",
  "src/sardis/chain",
  "src/sardis/cards",
  "src/sardis/checkout",
  "src/sardis/compliance",
  "src/sardis/wallet",
  "src/sardis/ledger",
  "src/sardis/ucp",
  "src/sardis/ramp",
  "src/sardis/guardrails",
  "src/sardis/protocol",
]

[tool.hatch.build.targets.sdist]
# The sdist mirrors the published wheel surface (thin client only). The backend
# stays in the git source tree for the editable workspace install but is not
# distributed.
include = ["/src", "/README.md", "/CHANGELOG.md", "/LICENSE"]
exclude = [
  "src/sardis/core",
  "src/sardis/chain",
  "src/sardis/cards",
  "src/sardis/checkout",
  "src/sardis/compliance",
  "src/sardis/wallet",
  "src/sardis/ledger",
  "src/sardis/ucp",
  "src/sardis/ramp",
  "src/sardis/guardrails",
  "src/sardis/protocol",
]
