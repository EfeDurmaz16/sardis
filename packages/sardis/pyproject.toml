[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "sardis"
version = "2.0.0-rc.0"
description = "Payment OS for the Agent Economy — Python SDK, CLI, and runtime primitives"
readme = "README.md"
license = "MIT"
authors = [{name = "Sardis", email = "hello@sardis.sh"}]
requires-python = ">=3.11"
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Office/Business :: Financial",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
  "Framework :: AsyncIO",
]
keywords = ["sardis", "payments", "agents", "stablecoin", "x402", "ap2", "ucp", "agent-economy"]

# Runtime deps from consolidated submodules. Heavy/optional deps live under
# [project.optional-dependencies] (chain, postgres, redis, immudb).
dependencies = [
  # Inherited from sardis-core (sardis.core submodule)
  "pydantic>=2.6",
  "pydantic-settings>=2.0",
  "PyNaCl>=1.5",
  "cryptography>=41",
  "apscheduler>=3.10",
  "asyncpg>=0.29",
  "aiohttp>=3.8",
  "httpx>=0.27",
  "fastapi>=0.110",
  # Inherited from sardis-guardrails (sardis.guardrails.ml_fraud)
  "numpy>=1.26",
  # Inherited from sardis-cli (sardis.cli)
  "click>=8.1",
  "rich>=13.0",
  "keyring>=24.0",
  "python-dotenv>=1.0",
]

[project.optional-dependencies]
anthropic     = ["anthropic>=0.40"]
langchain     = ["langchain>=0.3", "langchain-core>=0.3"]
crewai        = ["crewai>=0.95"]
openai-agents = ["openai-agents>=0.2"]
autogpt       = ["autogpt-platform-backend>=0.4"]
browser-use   = ["browser-use>=0.1.40"]
composio      = ["composio-core>=0.5"]
adk           = ["google-adk>=1.0"]
a2a           = []
ai-sdk        = []
postgres      = ["psycopg[binary,pool]>=3.2", "sqlalchemy>=2.0"]
redis         = ["redis>=5.2"]
immudb        = ["immudb-py>=1.5"]
chain         = ["web3>=6.20", "eth-account>=0.13", "eth-abi>=5.0"]
all = [
  "sardis[anthropic,langchain,crewai,openai-agents,autogpt,browser-use,composio,adk,a2a,ai-sdk,postgres,redis,immudb,chain]",
]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-httpx>=0.30",
  "pytest-cov>=4.1",
  "mypy>=1.8",
  "ruff>=0.5",
  "respx>=0.20",
]

[project.scripts]
sardis     = "sardis.cli.main:cli"
sardis-cli = "sardis.cli.main:cli"

[project.urls]
Homepage      = "https://sardis.sh"
Documentation = "https://sardis.sh/docs"
Repository    = "https://github.com/EfeDurmaz16/sardis"
Changelog     = "https://github.com/EfeDurmaz16/sardis/blob/main/packages/sardis/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/sardis"]

[tool.hatch.build.targets.sdist]
include = ["/src", "/README.md", "/CHANGELOG.md", "/LICENSE"]
