[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sardis-openai-agents"
version = "0.1.0"
description = "Sardis payment tools for OpenAI Agents SDK"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "sardis>=1.0.0",
]

[project.optional-dependencies]
agents = [
    "openai-agents>=0.1.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[tool.hatch.build.targets.wheel]
packages = ["sardis_openai_agents"]
