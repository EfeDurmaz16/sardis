[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sardis-openai-agents"
version = "1.0.0"
description = "Sardis payment tools for OpenAI Agents SDK"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Sardis", email = "efe@sardis.sh" }]
keywords = ["sardis", "openai", "agents", "payments", "ai-agents", "fintech"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "sardis>=1.0.0",
]

[project.optional-dependencies]
agents = [
    "openai-agents>=0.1.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.urls]
Homepage = "https://sardis.sh"
Documentation = "https://sardis.sh/docs"
Repository = "https://github.com/EfeDurmaz16/sardis"

[tool.hatch.build.targets.wheel]
packages = ["sardis_openai_agents"]
