[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "sardis-sdk"
version = "1.0.0"
description = "Production-grade Python SDK for the Sardis stablecoin execution layer"
readme = "README.md"
authors = [{name = "Sardis", email = "hello@sardis.sh"}]
license = {text = "MIT"}
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
    "Framework :: AsyncIO",
]
keywords = [
    "sardis",
    "stablecoin",
    "payments",
    "blockchain",
    "api",
    "sdk",
    "async",
    "ai",
    "agents",
]
dependencies = [
    "httpx[http2]>=0.27",
    "pydantic>=2.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-httpx>=0.30",
    "pytest-cov>=4.1",
    "mypy>=1.8",
    "ruff>=0.2",
    "respx>=0.20",
]
integrations = [
    "langchain>=0.1",
    "llama-index>=0.10",
    "openai>=1.0",
]
all = [
    "sardis-sdk[dev,integrations]",
]

[project.urls]
Homepage = "https://sardis.sh"
Documentation = "https://sardis.sh/docs"
Repository = "https://github.com/EfeDurmaz16/sardis"
Changelog = "https://github.com/EfeDurmaz16/sardis/blob/main/packages/sardis-sdk-python/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/sardis_sdk"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/README.md",
    "/CHANGELOG.md",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "F",      # pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "RUF",    # Ruff-specific rules
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate
    "PL",     # pylint
]
ignore = [
    "PLR0913",  # Too many arguments
    "PLR2004",  # Magic value comparison
    "B008",     # Depends() in defaults, standard FastAPI pattern
    "B904",     # raise from, too noisy for existing code
    "E402",     # module-level import order, conditional imports
    "N806",     # variable in function should be lowercase
    "N801",     # class name should use CapWords
    "N818",     # exception name should end with Error
    "E501",     # line too long
    "B017",     # assertRaises(Exception) too broad
    "E741",     # ambiguous variable name
    "E722",     # bare except
    "N802",     # function name should be lowercase
    "B027",     # empty method in abstract base class
    "SIM102",   # collapsible if statements
    "SIM105",   # use contextlib.suppress
    "SIM108",   # ternary operator
    "SIM113",   # use enumerate
    "SIM103",   # return condition directly
    "SIM117",   # merge with statements
    "PLC0415",  # import outside top-level
    "PLR0912",  # too many branches
    "PLR0915",  # too many statements
    "PLR0911",  # too many return statements
    "UP035",    # deprecated import
]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401", "F811"]
"tests/**" = ["F401", "F811", "F841", "E722", "B007", "N802"]

[tool.ruff.lint.isort]
known-first-party = ["sardis_sdk"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
show_error_codes = true

[[tool.mypy.overrides]]
module = [
    "httpx.*",
    "pydantic.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
pythonpath = ["src"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
]
markers = [
    "slow: marks tests as slow",
    "integration: marks tests as integration tests",
]

[tool.coverage.run]
source = ["sardis_sdk"]
branch = true
omit = ["tests/*", "*/__init__.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@abstractmethod",
    "def __repr__",
]
fail_under = 80
show_missing = true

[dependency-groups]
dev = [
    "langchain>=1.2.6",
    "langchain-core>=1.2.7",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-httpx>=0.36.0",
    "mypy>=1.8",
    "ruff>=0.2",
]
