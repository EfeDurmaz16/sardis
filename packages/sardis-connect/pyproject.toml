[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "sardis-connect"
version = "0.1.0"
description = "Make any API agent-ready in 3 lines. Zero-crypto merchant integration for Sardis."
authors = [{name = "Sardis Labs", email = "dev@sardis.sh"}]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.10"
keywords = ["payments", "agents", "ai", "merchant", "api", "sardis"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Office/Business :: Financial",
]
dependencies = [
    "fastapi>=0.100",
    "httpx>=0.25",
    "pydantic>=2.0",
]

[project.optional-dependencies]
express = ["starlette>=0.27"]

[project.urls]
Homepage = "https://sardis.sh/connect"
Documentation = "https://sardis.sh/docs/connect"
Repository = "https://github.com/EfeDurmaz16/sardis"

[tool.hatch.build.targets.wheel]
packages = ["src/sardis_connect"]
