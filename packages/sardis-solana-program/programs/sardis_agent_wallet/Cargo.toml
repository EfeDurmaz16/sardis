[package]
name = "sardis-agent-wallet"
version = "0.1.0"
description = "Sardis Agent Wallet — on-chain spending policy enforcement for AI agent wallets on Solana"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "sardis_agent_wallet"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]

[dependencies]
anchor-lang = { version = "0.30", features = ["init-if-needed"] }
anchor-spl = "0.30"
bytemuck = { version = "1.14", features = ["derive"] }
