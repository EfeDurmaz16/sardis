[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "sardis-browser-use"
version = "0.1.0"
description = "Sardis payment tools for Browser Use - enable browser agents to make policy-controlled payments"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "Sardis", email = "sdk@sardis.sh"}]
keywords = ["sardis", "browser-use", "ai-agents", "payments", "stablecoin"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "sardis>=1.0.0",
    "browser-use>=0.1.0",
]

[project.urls]
Homepage = "https://sardis.sh"
Documentation = "https://sardis.sh/docs/integrations/browser-use"
Repository = "https://github.com/sardis-pay/sardis"

[tool.setuptools.packages.find]
include = ["sardis_browser_use*"]
