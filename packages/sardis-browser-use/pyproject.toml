[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sardis-browser-use"
version = "0.99.0"
description = "Deprecation shim — sardis-browser-use is now part of sardis (use `pip install sardis[browser-use]`)."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.12"
authors = [{name = "Sardis", email = "efe@sardis.sh"}]
keywords = ["sardis", "browser-use", "ai-agents", "payments", "stablecoin"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "sardis>=2.0.0a0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[project.urls]
Homepage = "https://sardis.sh"
Documentation = "https://sardis.sh/docs/integrations/browser-use"
Repository = "https://github.com/EfeDurmaz16/sardis"

[tool.hatch.build.targets.wheel]
packages = ["sardis_browser_use"]
