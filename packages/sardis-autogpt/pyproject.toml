[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sardis-autogpt"
version = "0.1.0"
description = "Sardis payment blocks for AutoGPT - policy-controlled AI agent payments"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Sardis", email = "dev@sardis.sh" }]
keywords = ["sardis", "autogpt", "payments", "ai-agents", "blockchain", "usdc"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "sardis>=1.0.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[project.urls]
Homepage = "https://sardis.sh"
Documentation = "https://sardis.sh/docs"
Repository = "https://github.com/sardis-sh/sardis"

[tool.hatch.build.targets.wheel]
packages = ["sardis_autogpt"]

[tool.pytest.ini_options]
testpaths = ["tests"]
