[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "sardis-e2b"
version = "0.1.0"
description = "E2B sandbox template helpers for Sardis-enabled agents"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
dependencies = []

[project.optional-dependencies]
e2b = ["e2b>=1.0"]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["sardis_e2b"]
