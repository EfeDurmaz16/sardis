# Sardis Alert Rules Configuration
# Consumed by monitoring/alerting systems (Prometheus Alertmanager, Grafana, custom).

global:
  evaluation_interval: 60s
  notification_channels:
    - name: slack-ops
      type: webhook
      url: ${SLACK_WEBHOOK_URL}
    - name: pagerduty
      type: pagerduty
      routing_key: ${PAGERDUTY_KEY}

rules:

  # ── Health Check ──────────────────────────────────────────────
  - name: health_endpoint_down
    description: API health endpoint is not responding
    source: health_monitor
    condition: http_status != 200 OR response_time > 5s
    for: 2m
    severity: critical
    channels: [slack-ops, pagerduty]
    labels:
      component: api
      team: platform

  - name: health_degraded
    description: One or more non-critical components report unhealthy
    source: health_monitor
    condition: status == "degraded"
    for: 5m
    severity: warning
    channels: [slack-ops]
    labels:
      component: api

  # ── Database ──────────────────────────────────────────────────
  - name: database_unhealthy
    description: PostgreSQL connection pool exhausted or unreachable
    source: health_monitor
    condition: components.database.status != "healthy"
    for: 1m
    severity: critical
    channels: [slack-ops, pagerduty]
    labels:
      component: database

  # ── Cache ─────────────────────────────────────────────────────
  - name: cache_down
    description: Redis/Upstash cache is unreachable
    source: health_monitor
    condition: components.cache.status != "healthy"
    for: 3m
    severity: warning
    channels: [slack-ops]
    labels:
      component: cache

  # ── RPC / Blockchain ──────────────────────────────────────────
  - name: rpc_endpoint_failure
    description: Blockchain RPC endpoint is unreachable or returning errors
    source: health_monitor
    condition: components.rpc.status != "healthy"
    for: 2m
    severity: critical
    channels: [slack-ops, pagerduty]
    labels:
      component: rpc

  - name: gas_price_spike
    description: Gas price exceeds acceptable threshold
    source: contract_monitor
    condition: gas_price_gwei > 50
    for: 5m
    severity: warning
    channels: [slack-ops]
    labels:
      component: chain

  # ── Transactions ──────────────────────────────────────────────
  - name: transaction_stuck
    description: Transaction has been pending for more than 5 minutes
    source: sardis_chain
    condition: tx.status == "pending" AND tx.age > 5m
    for: 0s
    severity: critical
    channels: [slack-ops, pagerduty]
    labels:
      component: chain
    annotations:
      runbook: "Check nonce, gas price. Consider speed-up or cancellation."

  - name: transaction_failure_rate
    description: Transaction failure rate exceeds 5% over a 10-minute window
    source: sardis_chain
    condition: rate(tx_failures[10m]) / rate(tx_total[10m]) > 0.05
    for: 5m
    severity: warning
    channels: [slack-ops]
    labels:
      component: chain

  # ── Spending & Limits ─────────────────────────────────────────
  - name: daily_spend_limit_approaching
    description: Agent wallet daily spend exceeds 80% of configured limit
    source: sardis_core
    condition: wallet.daily_spent / wallet.daily_limit > 0.80
    for: 0s
    severity: warning
    channels: [slack-ops]
    labels:
      component: policy

  - name: daily_spend_limit_exceeded
    description: Agent wallet daily spend reached 100% of limit
    source: sardis_core
    condition: wallet.daily_spent >= wallet.daily_limit
    for: 0s
    severity: critical
    channels: [slack-ops, pagerduty]
    labels:
      component: policy

  - name: large_single_transaction
    description: Single transaction exceeds $10,000 equivalent
    source: sardis_chain
    condition: tx.amount_usd > 10000
    for: 0s
    severity: warning
    channels: [slack-ops]
    labels:
      component: compliance

  # ── Compliance ────────────────────────────────────────────────
  - name: compliance_service_down
    description: Persona KYC or Elliptic AML service unreachable
    source: health_monitor
    condition: components.compliance.status != "healthy"
    for: 2m
    severity: critical
    channels: [slack-ops, pagerduty]
    labels:
      component: compliance
    annotations:
      impact: "New wallet creation and high-risk transactions will be blocked."

  - name: sanctions_check_failure
    description: Sanctions screening returning errors
    source: sardis_compliance
    condition: rate(sanctions_errors[5m]) > 0
    for: 1m
    severity: critical
    channels: [slack-ops, pagerduty]
    labels:
      component: compliance

  # ── MPC / Turnkey ─────────────────────────────────────────────
  - name: turnkey_unhealthy
    description: Turnkey MPC signing service is unreachable
    source: health_monitor
    condition: components.turnkey.status != "healthy"
    for: 1m
    severity: critical
    channels: [slack-ops, pagerduty]
    labels:
      component: wallet
    annotations:
      impact: "All transaction signing will fail."

  # ── Contracts ─────────────────────────────────────────────────
  - name: contract_health_degraded
    description: On-chain contract checks failing
    source: health_monitor
    condition: components.contracts.status != "healthy"
    for: 5m
    severity: warning
    channels: [slack-ops]
    labels:
      component: contracts

  - name: rapid_wallet_creation
    description: Unusual number of wallets created in a short period
    source: contract_monitor
    condition: factory.new_wallets > 10 per 100 blocks
    for: 0s
    severity: warning
    channels: [slack-ops]
    labels:
      component: contracts

  - name: escrow_dispute_opened
    description: An escrow dispute has been initiated
    source: contract_monitor
    condition: escrow.disputes > 0
    for: 0s
    severity: warning
    channels: [slack-ops]
    labels:
      component: contracts

  # ── API Performance ───────────────────────────────────────────
  - name: api_latency_high
    description: p95 API latency exceeds 2 seconds
    source: sardis_api
    condition: http_request_duration_p95 > 2s
    for: 5m
    severity: warning
    channels: [slack-ops]
    labels:
      component: api

  - name: api_error_rate
    description: 5xx error rate exceeds 1%
    source: sardis_api
    condition: rate(http_5xx[5m]) / rate(http_total[5m]) > 0.01
    for: 3m
    severity: critical
    channels: [slack-ops, pagerduty]
    labels:
      component: api

  # ── Payment Control Plane ────────────────────────────────────
  - name: payment_execution_latency_high
    description: p95 payment execution latency exceeds 3 seconds
    source: sardis_api
    condition: histogram_quantile(0.95, sum(rate(sardis_payment_execution_duration_seconds_bucket[5m])) by (le, rail)) > 3
    for: 5m
    severity: warning
    channels: [slack-ops]
    labels:
      component: payments

  - name: approval_queue_backlog
    description: Pending approval queue depth exceeds 50 items
    source: sardis_api
    condition: sardis_approval_queue_depth{queue="pending"} > 50
    for: 10m
    severity: warning
    channels: [slack-ops]
    labels:
      component: approvals

  - name: policy_denial_spike_detected
    description: Policy-denial bursts indicate drift or prompt-injection pressure
    source: sardis_api
    condition: increase(sardis_policy_denial_spikes_total[10m]) > 0
    for: 0s
    severity: warning
    channels: [slack-ops]
    labels:
      component: policy

  - name: agent_rate_limit_burst
    description: Agent payment endpoint rate-limit denials exceed threshold
    source: sardis_api
    condition: increase(sardis_payment_agent_rate_limited_total[5m]) > 20
    for: 5m
    severity: warning
    channels: [slack-ops]
    labels:
      component: api

  # ── Facility Gate ────────────────────────────────────────────
  - name: facility_gate_exception_spike
    description: Facility Gate exception events are increasing and need operator review
    source: sardis_api
    condition: increase(sardis_facility_exceptions_total[10m]) > 3
    for: 5m
    severity: critical
    channels: [slack-ops, pagerduty]
    labels:
      component: facility_gate
      surface: exceptions
    annotations:
      runbook: docs/design-partner/facility-gate/incident-runbook.md

  - name: facility_gate_adapter_execute_failures
    description: Facility Gate adapter execution failures indicate simulator/provider execution risk
    source: sardis_api
    condition: increase(sardis_facility_adapter_events_total{operation="execute",status="failed"}[10m]) > 0
    for: 0s
    severity: critical
    channels: [slack-ops, pagerduty]
    labels:
      component: facility_gate
      surface: adapter
    annotations:
      runbook: docs/design-partner/facility-gate/incident-runbook.md

  - name: facility_gate_revocation_propagation_failure
    description: Facility Gate adapter revocation failed after a revocation event
    source: sardis_api
    condition: increase(sardis_facility_adapter_events_total{operation="revoke",status="failed"}[5m]) > 0
    for: 0s
    severity: critical
    channels: [slack-ops, pagerduty]
    labels:
      component: facility_gate
      surface: revocation
    annotations:
      impact: "Previously approved authority may remain usable at the execution adapter."
      runbook: docs/design-partner/facility-gate/incident-runbook.md

  - name: facility_gate_manual_review_backlog
    description: Facility Gate step-up/manual-review queue exceeds pilot operating threshold
    source: sardis_api
    condition: sardis_facility_manual_review_queue_depth > 25
    for: 15m
    severity: warning
    channels: [slack-ops]
    labels:
      component: facility_gate
      surface: approvals
    annotations:
      runbook: docs/design-partner/facility-gate/incident-runbook.md

  - name: facility_gate_denial_spike
    description: Facility Gate denial decisions increased sharply; check policy drift, stale authority, or probing
    source: sardis_api
    condition: increase(sardis_facility_decisions_total{verdict="denied"}[15m]) > 20
    for: 5m
    severity: warning
    channels: [slack-ops]
    labels:
      component: facility_gate
      surface: decisioning
    annotations:
      runbook: docs/design-partner/facility-gate/incident-runbook.md

  - name: facility_gate_step_up_spike
    description: Facility Gate step-up volume increased sharply; review evidence quality and approval fatigue
    source: sardis_api
    condition: increase(sardis_facility_decisions_total{verdict="step_up_required"}[15m]) > 20
    for: 5m
    severity: warning
    channels: [slack-ops]
    labels:
      component: facility_gate
      surface: approvals
    annotations:
      runbook: docs/design-partner/facility-gate/incident-runbook.md

  - name: facility_gate_projection_drift_detected
    description: Facility Gate replay verification detected request-state projection drift
    source: sardis_api
    condition: sardis_facility_projection_drift_count > 0
    for: 0s
    severity: critical
    channels: [slack-ops, pagerduty]
    labels:
      component: facility_gate
      surface: projections
    annotations:
      runbook: docs/design-partner/facility-gate/incident-runbook.md

  - name: facility_gate_duplicate_idempotency_anomaly
    description: Facility Gate duplicate idempotency patterns exceeded pilot threshold
    source: facility_gate_replay
    condition: facility_gate_duplicate_idempotency_anomaly_count > 0
    for: 0s
    severity: warning
    channels: [slack-ops]
    labels:
      component: facility_gate
      surface: idempotency
    annotations:
      runbook: docs/design-partner/facility-gate/incident-runbook.md
