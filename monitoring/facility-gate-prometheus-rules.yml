groups:
  - name: sardis-facility-gate
    rules:
      - alert: SardisFacilityGateAuthorizationFailures
        expr: increase(sardis_facility_gate_authorization_failures_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
          service: sardis-api
        annotations:
          summary: Facility Gate authorization failures detected
          description: Facility Gate rejected one or more authorization attempts in the last five minutes.
      - alert: SardisFacilityGateAdapterErrors
        expr: increase(sardis_facility_gate_adapter_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
          service: sardis-api
        annotations:
          summary: Facility Gate adapter errors detected
          description: Facility Gate provider adapter calls are failing and may block pilot traffic.
