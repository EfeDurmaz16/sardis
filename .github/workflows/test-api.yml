name: Test API

on:
  push:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/sardis-core/**'
      - 'docs/security/**'
      - 'monitoring/alerts.yml'
      - 'ops/grafana/**'
  pull_request:
    paths:
      - 'packages/api/**'
      - 'packages/sardis-core/**'
      - 'docs/security/**'
      - 'monitoring/alerts.yml'
      - 'ops/grafana/**'

permissions: read-all

env:
  PYTHON_VERSION: '3.12'

jobs:
  test:
    name: API Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sardis
          POSTGRES_PASSWORD: sardis
          POSTGRES_DB: sardis_facility_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sardis -d sardis_facility_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check packages/api/ packages/sardis-core/

      - name: Package test drift report
        continue-on-error: true
        run: uv run pytest packages/api/tests/ -v --tb=short -q
        env:
          SARDIS_SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret
          SARDIS_ENVIRONMENT: dev
          SARDIS_TEST_POSTGRES_DSN: postgresql://sardis:sardis@localhost:5432/sardis_facility_test

      - name: Facility Gate pilot tabletop
        run: |
          uv run python packages/api/scripts/facility_gate_pilot_tabletop.py \
            --output facility-gate-tabletop.json
        env:
          SARDIS_SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret
          SARDIS_ENVIRONMENT: test

      - name: Facility Gate pilot readiness
        run: |
          uv run python packages/api/scripts/facility_gate_pilot_readiness.py org_tabletop \
            --run-tabletop \
            --require-alerts \
            --output facility-gate-readiness.json
        env:
          SARDIS_SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret
          SARDIS_ENVIRONMENT: test
          SARDIS_FACILITY_GATE_ENABLED: "true"
          SARDIS_FACILITY_GATE_REQUIRE_PERSISTED_AUTHORITY: "true"
          SARDIS_FACILITY_GATE_ORG_ALLOWLIST: org_tabletop

      - name: Upload Facility Gate tabletop report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: facility-gate-tabletop
          path: facility-gate-tabletop.json

      - name: Upload Facility Gate readiness report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: facility-gate-readiness
          path: facility-gate-readiness.json
