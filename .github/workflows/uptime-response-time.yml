name: Response Time CI

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  response-time:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: upptime/uptime-monitor@1b53cea83cd619c9ddb2aec18366abd00cfa060d # v1.41.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          command: "response-time"
