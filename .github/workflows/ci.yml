name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Default: no permissions. Each job declares its own minimal set.
permissions: {}

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  python-lint-test:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install dependencies
        run: uv sync

      - name: Run ruff lint
        run: uv run ruff check .

      - name: Run root tests with coverage
        run: >-
          uv run pytest tests/ -v --tb=short
          --cov=packages/sardis-core/src
          --cov=packages/sardis-api/src
          --cov-report=xml
          --cov-fail-under=40

      - name: Run package tests
        run: |
          uv run pytest packages/sardis-core/tests/ -v --tb=short
          uv run pytest packages/sardis-ledger/tests/ -v --tb=short
          uv run pytest packages/sardis-chain/tests/ -v --tb=short

  idempotency-replay-e2e:
    name: Idempotency Replay E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install dependencies
        run: uv sync --extra all --extra dev

      - name: Run idempotency/replay E2E gate
        run: bash scripts/release/idempotency_replay_e2e_check.sh

  contracts-gas:
    name: Contracts Gas Ceiling
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write        # needed for upload-artifact
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: v1.7.0
          cache: false

      - name: Run gas ceiling tests
        run: forge test --match-test "testGasCeiling_" --gas-report -vv | tee gas-report.txt

      - name: Upload gas report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: contracts-gas-report
          path: contracts/gas-report.txt

  contracts-strict:
    name: Contracts Strict Forge
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: v1.7.0
          cache: false

      - name: Pre-install solc 0.8.24
        run: |
          mkdir -p ~/.svm/0.8.24
          curl -sSL "https://github.com/ethereum/solidity/releases/download/v0.8.24/solc-static-linux" -o ~/.svm/0.8.24/solc-0.8.24
          chmod +x ~/.svm/0.8.24/solc-0.8.24

      - name: Enforce formatting
        run: forge fmt --check src test script

      - name: Build contracts
        run: forge build --sizes -vv

      - name: Run full contract test suite
        run: forge test -vvv

  typescript-sdk:
    name: TypeScript SDK Build & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build SDK
        run: pnpm --filter @sardis/sdk build

      - name: Build MCP Server
        run: pnpm --filter @sardis/mcp-server build

      - name: Type check SDK
        run: pnpm --filter @sardis/sdk typecheck

      - name: Test SDK
        run: pnpm --filter @sardis/sdk test

  dashboard-build:
    name: Canonical Dashboard Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Type check dashboard
        run: pnpm --filter @sardis/app-dashboard typecheck

      - name: Build dashboard
        run: pnpm --filter @sardis/app-dashboard build

  build-landing:
    name: Canonical Landing Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build landing page
        run: pnpm --filter @sardis/app-landing typecheck && pnpm --filter @sardis/app-landing build
