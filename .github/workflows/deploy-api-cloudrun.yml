name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/sardis-core/**'
      - 'packages/sardis-chain/**'

permissions:
  contents: read

env:
  SERVICE_NAME: sardis-api
  REGION: us-east1

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check GCP credentials
        id: check-gcp
        env:
          GCP_WIP: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          if [ -z "$GCP_WIP" ]; then
            echo "::error::GCP_WORKLOAD_IDENTITY_PROVIDER secret is not configured. Public OSS deploys use this workflow plus cloudbuild.yaml; private/manual Cloud Run helper scripts are intentionally not tracked in this repo."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Build with Cloud Build
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud builds submit \
            --project="$GCP_PROJECT_ID" \
            --config=cloudbuild.yaml \
            --substitutions=_SERVICE_NAME=${{ env.SERVICE_NAME }},_REGION=${{ env.REGION }}

      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --project="$GCP_PROJECT_ID" \
            --region=${{ env.REGION }} \
            --image="gcr.io/$GCP_PROJECT_ID/${{ env.SERVICE_NAME }}:latest" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8000

      - name: Verify deployment
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --project="$GCP_PROJECT_ID" \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          curl -sf "${URL}/health" || exit 1
