name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'packages/sardis-api/**'
      - 'packages/sardis-core/**'
      - 'packages/sardis-chain/**'

env:
  SERVICE_NAME: sardis-api
  REGION: us-east1

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build with Cloud Build
        run: |
          gcloud builds submit \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --config=cloudbuild.yaml \
            --substitutions=_SERVICE_NAME=${{ env.SERVICE_NAME }},_REGION=${{ env.REGION }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest \
            --platform=managed \
            --allow-unauthenticated \
            --port=8000

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          curl -sf "${URL}/health" || exit 1
