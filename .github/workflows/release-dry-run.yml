name: Release Dry Run

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - ".github/workflows/release-dry-run.yml"
      - ".github/workflows/release-npm.yml"
      - ".github/workflows/release-python-sdk.yml"
      - "scripts/check_release_readiness.sh"
      - "scripts/check_python_release_readiness.sh"
      - "scripts/oss_surface_check.py"
      - "packages/sardis-mcp-server/**"
      - "packages/sardis-js/**"
      - "packages/sardis/**"
      - "pnpm-lock.yaml"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release-dry-run.yml"
      - ".github/workflows/release-npm.yml"
      - ".github/workflows/release-python-sdk.yml"
      - "scripts/check_release_readiness.sh"
      - "scripts/check_python_release_readiness.sh"
      - "scripts/oss_surface_check.py"
      - "packages/sardis-mcp-server/**"
      - "packages/sardis-js/**"
      - "packages/sardis/**"
      - "pnpm-lock.yaml"
      - "pyproject.toml"

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

jobs:
  engineering-readiness-gate:
    name: Engineering Readiness Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            packages/**/pyproject.toml

      - name: Install Python dependencies
        run: |
          uv sync
          uv pip install build twine hatchling

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Run strict engineering gate
        run: pnpm run check:release-readiness:strict

  npm-package-dry-run:
    name: NPM Package Dry Run
    runs-on: ubuntu-latest
    needs: [engineering-readiness-gate]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release artifacts
        run: |
          pnpm run build:mcp
          pnpm run build:ts-sdks

      - name: Dry-run package build
        shell: bash
        run: |
          set -euo pipefail
          OUT="/tmp/sardis-npm-dry-run"
          mkdir -p "$OUT"
          pnpm --dir packages/sardis-mcp-server pack --pack-destination "$OUT"
          pnpm --dir packages/sardis-js pack --pack-destination "$OUT"
          ls -la "$OUT"

      - name: Local install smoke check from tarballs
        shell: bash
        run: |
          set -euo pipefail
          OUT="/tmp/sardis-npm-dry-run"
          SMOKE="/tmp/sardis-npm-smoke"
          rm -rf "$SMOKE"
          mkdir -p "$SMOKE"
          cd "$SMOKE"
          npm init -y >/dev/null
          npm install \
            "$OUT"/sardis-*.tgz \
            "$OUT"/sardis-mcp-server-*.tgz

          node -e "import('sardis').then(() => console.log('sardis-import-ok')).catch((e) => { console.error(e); process.exit(1); })"
          npx sardis-mcp --help >/dev/null

  pypi-package-dry-run:
    name: PyPI Package Dry Run
    runs-on: ubuntu-latest
    needs: [engineering-readiness-gate]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install build twine hatchling

      - name: Build python package artifacts
        working-directory: packages/sardis
        run: python3 -m build

      - name: Validate distributions
        working-directory: packages/sardis
        run: python3 -m twine check dist/*

      - name: Local wheel smoke install
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv /tmp/sardis-py-dry-run
          source /tmp/sardis-py-dry-run/bin/activate
          python -m pip install --upgrade pip
          python -m pip install packages/sardis/dist/*.whl
          python - <<'PY'
          import sardis
          print("sardis-version", sardis.__version__)
          assert sardis.__version__
          PY
