name: Deploy Canonical Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - 'packages/ui-web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  pull_request:
    paths:
      - 'apps/dashboard/**'
      - 'packages/ui-web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

permissions: read-all

env:
  NODE_VERSION: '22'

jobs:
  build:
    name: Build Canonical Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm --filter @sardis/app-dashboard typecheck

      - name: Lint
        run: pnpm --filter @sardis/app-dashboard lint

      - name: Build
        run: pnpm --filter @sardis/app-dashboard build

  deploy:
    name: Deploy Canonical Dashboard to Vercel
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.sardis.sh
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm --filter @sardis/app-dashboard build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@16e87c0a08142b0d0d33b76aeaf20823c381b9b9 # v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}
          working-directory: apps/dashboard
          vercel-args: '--prod'
