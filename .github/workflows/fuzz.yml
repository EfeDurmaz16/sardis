name: Fuzz Testing
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 6'  # Weekly Saturday 8am UTC

permissions: read-all

jobs:
  fuzz:
    name: Python Fuzz Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install atheris
          pip install -e ".[dev]" || pip install -e .

      - name: Run fuzz tests
        run: python tests/fuzz/fuzz_spending_policy.py
        timeout-minutes: 10
        env:
          FUZZING_DURATION: 60
