name: Fuzz Testing
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 6'  # Weekly Saturday 8am UTC

jobs:
  fuzz:
    name: Python Fuzz Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install atheris
          pip install -e ".[dev]" || pip install -e .

      - name: Run fuzz tests
        run: python tests/fuzz/fuzz_spending_policy.py
        timeout-minutes: 10
        env:
          FUZZING_DURATION: 60
