name: Fuzz Testing
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 6'  # Weekly Saturday 8am UTC

permissions:
  contents: read

jobs:
  fuzz:
    name: Python Fuzz Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install atheris
          pip install -e packages/sardis

      - name: Run fuzz tests
        run: python tests/fuzz/fuzz_spending_policy.py
        timeout-minutes: 10
        env:
          FUZZING_DURATION: 60
