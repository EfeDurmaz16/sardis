[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sardis"
version = "1.0.0"
description = "Payment OS for the Agent Economy — non-custodial MPC wallets with natural language spending policies for AI agents"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.12"
authors = [
    { name = "Efe Baran Durmaz", email = "efe@sardis.dev" }
]
keywords = [
    "sardis",
    "payments",
    "ai-agents",
    "stablecoin",
    "blockchain",
    "fintech",
    "mcp",
    "langchain",
    "wallet",
    "policy",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Office/Business :: Financial",
    "Framework :: AsyncIO",
    "Typing :: Typed",
]
dependencies = [
    "sardis-sdk>=1.0.0",
    "sardis-core>=1.0.0",
    "sardis-cli>=1.0.0",
    "pydantic>=2.6",
    "httpx>=0.27",
]

[project.optional-dependencies]
chain = ["sardis-chain>=1.0.0"]
compliance = ["sardis-compliance>=1.0.0"]
ledger = ["sardis-ledger>=1.0.0"]
wallet = ["sardis-wallet>=1.0.0"]
cards = ["sardis-cards>=1.0.0"]
ramp = ["sardis-ramp>=1.0.0"]
api = ["sardis-api>=1.0.0"]
protocols = [
    "sardis-protocol>=1.0.0",
    "sardis-a2a>=1.0.0",
    "sardis-ucp>=1.0.0",
]
checkout = ["sardis-checkout>=1.0.0"]
# Framework integrations
crewai = ["sardis-crewai>=1.0.0"]
langchain = ["sardis-langchain>=1.0.0"]
autogpt = ["sardis-autogpt>=1.0.0"]
openai-agents = ["sardis-openai-agents>=1.0.0"]
adk = ["sardis-adk>=1.0.0"]
browser-use = ["sardis-browser-use>=1.0.0"]
composio = ["sardis-composio>=1.0.0"]
guardrails = ["sardis-guardrails>=1.0.0"]
all = [
    "sardis[chain,compliance,ledger,wallet,cards,ramp,api,protocols,checkout]",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "hypothesis>=6.112",
    "mypy>=1.8",
    "ruff>=0.2",
]

[project.urls]
Homepage = "https://sardis.sh"
Documentation = "https://sardis.sh/docs"
Repository = "https://github.com/EfeDurmaz16/sardis"
Changelog = "https://sardis.sh/docs/changelog"

[tool.hatch.build.targets.wheel]
packages = ["sardis"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "hypothesis>=6.112",
    "mypy>=1.8",
    "ruff>=0.2",
]




