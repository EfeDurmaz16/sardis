# Additional Cloud Run env vars for merchant checkout (Pay with Sardis).
# Apply with: gcloud run services update sardis-api-staging --update-env-vars ...
#
# These supplement the base env vars in env.cloudrun.staging.yaml.

# Chain configuration
SARDIS_CHECKOUT_CHAIN: "base"                    # "base" for mainnet, "base_sepolia" for testnet
SARDIS_BASE_RPC_URL: "REPLACE_WITH_ALCHEMY_URL"  # https://base-mainnet.g.alchemy.com/v2/<key>

# Contract addresses (set after deployment)
SARDIS_BASE_LEDGER_ANCHOR_ADDRESS: "REPLACE_AFTER_DEPLOY"
SARDIS_BASE_REFUND_PROTOCOL_ADDRESS: "REPLACE_AFTER_DEPLOY"

# Checkout UI
SARDIS_CHECKOUT_BASE_URL: "https://checkout.sardis.sh"

# Coinbase CDP (for onramp)
CDP_API_KEY_ID: "REPLACE_ME"
CDP_API_KEY_SECRET: "REPLACE_ME"

# Bridge (for fiat settlement offramp)
BRIDGE_API_KEY: "REPLACE_ME"
BRIDGE_API_SECRET: "REPLACE_ME"
BRIDGE_ENVIRONMENT: "sandbox"                     # "sandbox" or "production"

# Background jobs
SARDIS_ENABLE_SCHEDULER: "1"
